[versions]
kgp = "2.3.20"
nmcp = "1.4.3"
nmcp-build-time = "1.4.4-SNAPSHOT-7b0410ef4061d1249c7b161698764b8194838354"
mosaic = "0.19.0-gradleup.0"

[libraries]
agp = "com.android.tools.build:gradle:8.2.0"
bcv = "org.jetbrains.kotlinx:binary-compatibility-validator:0.16.3"
bouncycastle-pg = "org.bouncycastle:bcpg-jdk18on:1.78.1"
